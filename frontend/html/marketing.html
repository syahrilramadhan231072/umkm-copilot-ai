<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marketing - UMKM Copilot AI</title>
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/layout.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/pages.css" />
  <link rel="stylesheet" href="../css/responsive.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand__icon">U</div>
        <div>
          <h1 class="brand__title">UMKM Copilot AI</h1>
          <p class="brand__subtitle">Smart Business Assistant</p>
        </div>
      </div>
      <nav class="nav">
        <a class="nav__link" href="index.html">Dashboard</a>
        <a class="nav__link" href="transactions.html">Transactions</a>
        <a class="nav__link" href="insights.html">Insights</a>
        <a class="nav__link nav__link--active" href="marketing.html">Marketing</a>
        <a class="nav__link" href="export.html">Export</a>
        <a class="nav__link" href="ai_assistant.html">AI Assistant</a>
        <a class="nav__link" href="settings.html">Settings</a>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <p class="eyebrow">Marketing</p>
          <h2 class="page-title">Kelola Materi Promosi</h2>
        </div>
      </header>

      <section class="content-grid">
        <article class="panel">
          <div class="panel__header">
            <div>
              <p class="eyebrow">Product Context</p>
              <h3 class="panel__title">Bangun Context Promosi</h3>
            </div>
          </div>
          <form class="form">
            <label class="form__group">
              <span>Product ID</span>
              <input type="text" placeholder="product-1" />
            </label>
            <button class="button button--primary" type="button">Build Context</button>
          </form>
        </article>

        <article class="panel">
          <div class="panel__header">
            <div>
              <p class="eyebrow">Save Record</p>
              <h3 class="panel__title">Simpan Riwayat Caption</h3>
            </div>
          </div>
          <form class="form">
            <label class="form__group">
              <span>Platform</span>
              <input type="text" value="Instagram" />
            </label>
            <label class="form__group">
              <span>Caption</span>
              <textarea placeholder="Tulis caption promosi"></textarea>
            </label>
            <button class="button button--secondary" type="button">Save Record</button>
          </form>
        </article>
      </section>
    </main>
  </div>
</body>
</html>
